<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>鑫办 - 企业公告</title>
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
  <div class="app-container">
    <div class="page-title-bar">
      <div class="page-title">企业公告</div>
      <button class="header-action-btn" id="addNoticeBtn" style="display: none;">+ 发布</button>
    </div>

    <div style="padding: 15px;" id="noticeList">
    </div>
  </div>

  <!-- 底部导航 -->
  <div class="tab-bar">
    <a href="index.html" class="tab-item">
      <div style="font-size: 22px; line-height: 1;">🏠</div>
      <div style="font-size: 11px; margin-top: 2px;">工作台</div>
    </a>
    <a href="attendance.html" class="tab-item">
      <div style="font-size: 22px; line-height: 1;">📋</div>
      <div style="font-size: 11px; margin-top: 2px;">考勤</div>
    </a>
    <a href="approval.html" class="tab-item">
      <div style="font-size: 22px; line-height: 1;">✏️</div>
      <div style="font-size: 11px; margin-top: 2px;">审批</div>
    </a>
    <a href="contacts.html" class="tab-item">
      <div style="font-size: 22px; line-height: 1;">👥</div>
      <div style="font-size: 11px; margin-top: 2px;">通讯录</div>
    </a>
    <a href="chat.html" class="tab-item">
      <div style="font-size: 22px; line-height: 1;">💬</div>
      <div style="font-size: 11px; margin-top: 2px;">消息</div>
    </a>
  </div>

  <!-- 发布公告弹窗 -->
  <div class="modal" id="noticeModal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <div class="modal-title">发布公告</div>
        <button class="modal-close" id="closeNoticeModal">&times;</button>
      </div>
      <div class="form-group">
        <label class="form-label">公告内容</label>
        <textarea id="noticeContent" class="form-input" rows="5" placeholder="请输入公告内容"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">发布范围</label>
        <select id="noticeScope" class="form-select">
          <option value="all">全员通知</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn-secondary" id="cancelNoticeBtn">取消</button>
        <button class="btn-primary" id="submitNoticeBtn">发布</button>
      </div>
    </div>
  </div>

  <script src="assets/js/app.js"></script>
  <script>
    if (!Session.isLoggedIn()) {
      window.location.href = 'login.html';
    }

    const user = Session.getCurrentUser();

    // 管理员可以发布公告
    if (user.role === 'super_admin' || user.role === 'dept_admin') {
      document.getElementById('addNoticeBtn').style.display = 'block';
    }

    // 加载公告
    function loadNotices() {
      const notices = DB.notice.getAll();
      const listEl = document.getElementById('noticeList');

      if (notices.length === 0) {
        listEl.innerHTML = `
          <div style="padding: 40px 20px; text-align: center; border: 2px dashed #e8e8e8; border-radius: 8px; background: white;">
            <div style="font-size: 48px; margin-bottom: 8px; opacity: 0.5;">📢</div>
            <div style="font-size: 14px; color: #999;">暂无公告</div>
          </div>`;
        return;
      }

      listEl.innerHTML = notices.map(n => `
        <div style="background: white; border-radius: 8px; padding: 15px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
          <div style="display: flex; align-items: flex-start; gap: 12px; margin-bottom: 10px;">
            <div style="width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #fa8c16, #d46b08); display: flex; align-items: center; justify-content: center; color: white; font-size: 16px; font-weight: bold; flex-shrink: 0;">${n.publisher ? n.publisher.charAt(0) : '?'}</div>
            <div style="flex: 1;">
              <div style="font-size: 14px; font-weight: 500; color: #333; margin-bottom: 4px;">${n.publisher}</div>
              <div style="font-size: 12px; color: #999;">${Utils.formatDateTime(n.createTime)}</div>
            </div>
            ${n.scope === 'all' ? '<div style="padding: 2px 8px; background: #e6f7ff; color: #1890ff; border-radius: 4px; font-size: 11px;">全员</div>' : ''}
          </div>
          <div style="padding: 10px 0; border-top: 1px solid #f0f0f0; font-size: 14px; color: #333; line-height: 1.8;">${n.content}</div>
        </div>
      `).join('');
    }

    // 发布公告
    document.getElementById('addNoticeBtn').addEventListener('click', () => {
      document.getElementById('noticeModal').style.display = 'flex';
      document.getElementById('noticeContent').value = '';
    });

    document.getElementById('closeNoticeModal').addEventListener('click', () => {
      document.getElementById('noticeModal').style.display = 'none';
    });

    document.getElementById('cancelNoticeBtn').addEventListener('click', () => {
      document.getElementById('noticeModal').style.display = 'none';
    });

    document.getElementById('submitNoticeBtn').addEventListener('click', () => {
      const content = document.getElementById('noticeContent').value.trim();
      const scope = document.getElementById('noticeScope').value;

      if (!content) {
        Utils.showToast('请输入公告内容');
        return;
      }

      DB.notice.add({
        content: content,
        scope: scope,
        publisher: user.name,
        publisherId: user._id
      });

      // 发送系统消息
      DB.messages.add('conv_all', {
        senderId: user._id,
        senderName: user.name,
        content: `【系统公告】${content}`
      });

      Utils.showToast('发布成功');
      document.getElementById('noticeModal').style.display = 'none';
      loadNotices();
    });

    loadNotices();
  </script>
</body>
</html>
